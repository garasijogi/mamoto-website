name: Sync Branch
on:
  push:
    branches:
      - 'staging-demo'
jobs:
  sync-branch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master

      - name: Merge staging-demo > deploy-staging
        uses: devmasx/merge-branch@v1.3.1
        with: 
          type: now
          from_branch: staging-demo
          target_branch: deploy-staging
          github_token: ${{ github.token }}
      
      # checkout the branch
      - uses: actions/checkout@v2
        with:
          ref: deploy-staging
          persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
          fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
      
      # update npm and composer
      - name: Create local changes
        run: |
          composer install --no-dev --optimize-autoloader
          npm install && npm run prod
          php artisan adminlte:install && php artisan adminlte:plugins install
          php artisan storage:link
      
      - run: git status
      
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
          
      - name: Commit files
        run: |
            git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git commit -m "update dependencies" -a
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
          
      - run: echo "🍏 This job's status is ${{ job.status }}."
